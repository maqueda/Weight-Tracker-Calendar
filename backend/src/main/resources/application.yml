spring:
  application:
    name: weight-tracker-calendar-backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${APP_JWT_SECRET:WeightTrackerCalendarDevelopmentJwtSecretKey1234567890}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:43200}
